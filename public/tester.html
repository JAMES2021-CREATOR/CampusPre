<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dark Mode Test</title>

  <script>
    tailwind.config = {
      darkMode: 'class',
    }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-white dark:bg-black text-black dark:text-white transition-colors duration-300">

  <nav class="p-6 bg-gray-200 dark:bg-gray-800 transition-colors duration-300">
    Navbar
  </nav>

  <div class="p-10">
    <button id="toggle"
      class="px-6 py-3 bg-blue-600 text-white rounded">
      Toggle Dark Mode
    </button>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const btn = document.getElementById("toggle");

      btn.addEventListener("click", function () {
        document.documentElement.classList.toggle("dark");
      });
    });
  </script>

</body>
</html>
